<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>melman</title>

    <!-- <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/hareketiseverim/data/refs/heads/main/melman/img/melman.ico" /> -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f6f8fb;
            font-family: system-ui
        }

        .hidden {
            display: none !important
        }

        .card {
            border-radius: 16px
        }

        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center
        }
    </style>

    <script>

        const CONFIG = {
            PASSWORD: "1",
            USE_REMOTE_DATA: true,
            DATA_URL: "https://raw.githubusercontent.com/hareketiseverim/data/refs/heads/main/melman/melman.json"
        };

        const LOCAL_DATA = [
            {
                "date": "2026-01-01",
                "weight": 60.9,
                "bloodPressure": {
                    "systolic": 11.6,
                    "diastolic": 7.4,
                    "pulse": 73
                }
            },
            {
                "date": "2026-01-02",
                "weight": 60.8,
                "bloodPressure": {
                    "systolic": 11.4,
                    "diastolic": 7.8,
                    "pulse": 79
                }
            }
        ];

        let healthData = [];

    </script>
</head>

<body>

    <!-- LOGIN -->
    <div id="loginScreen" class="login-wrap">
        <div class="card p-4 shadow" style="width:320px">

            <!-- <img src="https://raw.githubusercontent.com/hareketiseverim/data/refs/heads/main/melman/img/melman.gif" class="mb-3" style="width:40%; border-radius:50%; display:block; margin:auto" /> -->

            <h4 class="mb-3"></h4>
            <input autofocus id="pass" class="form-control mb-2" type="password" placeholder="parola"
                onkeypress="if(event.key === 'Enter') login()" />
            <button class="btn btn-primary w-100" onclick="login()">giriş</button>
            <div id="err" class="text-danger small mt-2"></div>
        </div>
    </div>

    <!-- APP -->
    <div id="app" class="hidden">
        <nav class="navbar bg-white border-bottom px-3">
            <b style="margin:auto">melman</b>
        </nav>

        <div class="container py-3">

            <div class="row g-3">

                <div class="col-md-3">
                    <div class="card p-3">
                        <small>Kilo</small>
                        <h3 id="w">-</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3">
                        <small>Tansiyon</small>
                        <h3 id="bp">-</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3">
                        <small>Nabız</small>
                        <h3 id="p">-</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3">
                        <small>Tarih</small>
                        <h3 id="date">-</h3>
                    </div>
                </div>

            </div>

            <div class="row mt-3 g-3">

                <div class="col-md-6">
                    <div class="card p-3">
                        <canvas id="c1"></canvas>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card p-3">
                        <canvas id="c2"></canvas>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card p-3">
                        <canvas id="c3"></canvas>
                    </div>
                </div>

            </div>

        </div>
        <style>
            body {
                background: #f4f6fb;
            }

            .card {
                border: none;
                box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
                border-radius: 16px;
            }

            h3 {
                margin: 0;
            }

            #list .card {
                margin-bottom: 12px;
            }
        </style>
        <script>

            function login() {

                const v = document.getElementById("pass").value;

                if (v !== CONFIG.PASSWORD) {
                    document.getElementById("err").innerText = "Hatalı şifre";
                    return;
                }

                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("app").classList.remove("hidden");

                load();
            }

            async function load() {

                healthData = CONFIG.USE_REMOTE_DATA
                    ? await (await fetch(CONFIG.DATA_URL)).json()
                    : LOCAL_DATA;

                render();
            }

            function latest() {
                return [...healthData].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
            }

            function render() {

                const l = latest();

                document.getElementById("w").innerText = l.weight + " kg";
                document.getElementById("bp").innerText = l.bloodPressure.systolic + "/" + l.bloodPressure.diastolic;
                document.getElementById("p").innerText = l.bloodPressure.pulse;
                document.getElementById("date").innerText = l.date;

            }

        </script>
        <script>

            let c1, c2, c3;

            function draw() {

                const labels = healthData.map(x => x.date);

                if (c1) c1.destroy();
                if (c2) c2.destroy();
                if (c3) c3.destroy();

                c1 = new Chart(document.getElementById("c1"), {
                    type: "line",
                    data: {
                        labels,
                        datasets: [{
                            label: "Kilo",
                            data: healthData.map(x => x.weight ?? 0),
                            borderColor: "blue"
                        }]
                    }
                });

                c2 = new Chart(document.getElementById("c2"), {
                    type: "line",
                    data: {
                        labels,
                        datasets: [
                            {
                                label: "Nabız",
                                data: healthData.map(x => x.bloodPressure?.pulse ?? 0),
                                borderColor: "green"
                            }
                        ]
                    }
                });

                c3 = new Chart(document.getElementById("c3"), {
                    type: "line",
                    data: {
                        labels,
                        datasets: [
                            {
                                label: "Yüksek Tansiyon",
                                data: healthData.map(x => x.bloodPressure?.systolic ?? 0),
                                borderColor: "red"
                            },
                            {
                                label: "Düşük Tansiyon",
                                data: healthData.map(x => x.bloodPressure?.diastolic ?? 0),
                                borderColor: "orange"
                            }
                        ]
                    }
                });
            }

            function init() {
                draw();
            }

            const _load = load;
            load = async function () {
                await _load();
                draw();
                init();
            };

        </script>

    </div>
</body>

</html>
